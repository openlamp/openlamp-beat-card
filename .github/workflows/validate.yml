name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # weekly, so HACS/action drift is caught even without commits
  workflow_dispatch:

jobs:
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS Action
        uses: hacs/action@main
        with:
          category: plugin
